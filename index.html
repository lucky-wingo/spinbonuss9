<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Royal Wheel - 4 Spins Daily</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-light: #fbf5b7;
            --gold-dark: #bf953f;
            --gold-gradient: linear-gradient(to bottom, var(--gold-light), var(--gold-dark));
            --text-cream: #f0e6d2;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            font-family: 'Playfair Display', serif;
            color: var(--text-cream);
            overflow: hidden;
            background-image: url('https://img2.pic.in.th/533bf6b6ec9fd3cbcd4e30d04b182fd8.jpg'); 
            background-size: cover;      
            background-position: center; 
            background-repeat: no-repeat; 
            box-shadow: inset 0 0 0 2000px rgba(0, 0, 0, 0.6); 
        }

        h1 {
            font-family: 'Cinzel Decorative', cursive;
            font-size: clamp(1.8rem, 6vw, 3rem); 
            text-align: center;
            margin-bottom: 25px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); 
            letter-spacing: 2px;
            position: relative;
            z-index: 2;
        }

        .mascot-container {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 5; 
            pointer-events: none; 
        }
        .mascot-container.left { left: 2%; }
        .mascot-container.right { right: 2%; }

        .mascot {
            width: clamp(90px, 25vw, 180px); 
            height: auto;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6)); 
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }
        .bouncy {
            animation: bounce 3s infinite ease-in-out;
        }
        .mascot-exciting {
            animation-duration: 0.8s !important; 
        }

        .wheel-wrapper-outer {
            position: relative;
            width: 100%;
            max-width: 400px; 
            padding: 10px; 
            box-sizing: border-box;
            border-radius: 50%;
            background: conic-gradient(
                var(--gold-dark), var(--gold-light), var(--gold-dark), 
                var(--gold-light), var(--gold-dark)
            );
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4), inset 0 0 15px rgba(0,0,0,0.8), 0 15px 30px rgba(0,0,0,0.8);
            z-index: 2;
        }

        .wheel-wrapper-inner {
             position: relative;
             width: 100%;
             aspect-ratio: 1 / 1; 
             border-radius: 50%;
             border: 4px solid #2a2a2a;
             box-sizing: border-box;
             overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;  
            height: 100%;
        }
        
        .pointer-container {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%) scale(0.85); 
            z-index: 10;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5));
        }
        
        .pointer-body {
            width: 50px;
            height: 50px;
            background: var(--gold-gradient);
            clip-path: polygon(50% 100%, 0% 0%, 100% 0%);
            position: relative;
        }

        #spinBtn {
            margin-top: 30px;
            padding: clamp(12px, 3vw, 18px) clamp(30px, 8vw, 60px);
            font-family: 'Cinzel Decorative', cursive;
            font-size: clamp(16px, 4vw, 22px);
            font-weight: bold;
            color: #2c0000;
            background: var(--gold-gradient);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
            text-transform: uppercase;
            z-index: 6;
        }

        #spinBtn:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
            opacity: 0.9;
        }

        #result {
            margin-top: 20px;
            font-size: clamp(20px, 6vw, 32px);
            font-weight: bold;
            color: var(--gold-light);
            height: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
            font-family: 'Cinzel Decorative', cursive;
            text-align: center;
            opacity: 0;
            transition: opacity 1s ease-in;
        }
        
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
        }

        @media (max-width: 480px) {
            .mascot-container { top: 60%; }
            .mascot { width: 90px; } 
        }
    </style>
</head>
<body>

    <h1>The Royal Wheel</h1>

    <div class="mascot-container left">
        <img src="https://img2.pic.in.th/-267654e8a773f2dd25.png" alt="Lucky Mascot Left" class="mascot bouncy">
    </div>
    <div class="mascot-container right">
        <img src="https://img5.pic.in.th/file/secure-sv1/-2528a13b3bc8f37209.png" alt="Lucky Mascot Right" class="mascot bouncy">
    </div>

    <div class="wheel-wrapper-outer">
        <div class="pointer-container">
            <div class="pointer-body"></div>
        </div>
        <div class="wheel-wrapper-inner">
            <canvas id="luxuryWheel" width="500" height="500"></canvas>
        </div>
    </div>

    <button id="spinBtn">Spin to Win</button>
    <div id="result"></div>
    
    <canvas id="confetti-canvas"></canvas>

    <script>
        const canvas = document.getElementById("luxuryWheel");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spinBtn");
        const resultDiv = document.getElementById("result");
        const mascots = document.querySelectorAll('.mascot'); 

        const tickSoundUrl = 'https://assets.mixkit.co/active_storage/sfx/2073/2073-preview.mp3'; 
        const winSoundUrl = 'https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3'; 
        const winAudio = new Audio(winSoundUrl);

        const MAX_SPINS_PER_DAY = 4;
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = canvas.width / 2;

        const prizes = ["10 🪙", "15 🪙", "20 🪙", "50 🪙", "100 🪙", "500 🪙", "1000 🪙", "10000 🪙"];
        const probabilities = [85, 7, 7, 0.5, 0.1, 0.1, 0.1, 0.1]; 
        const segmentColors = ["#D90429", "#00509E", "#00897B", "#7B2CBF", "#D90429", "#00509E", "#00897B", "#7B2CBF"];
        
        const numSegments = prizes.length;
        const arcSize = (2 * Math.PI) / numSegments;
        let currentAngle = 0;
        let isSpinning = false;
        let lastPassedSegment = -1; 

        // --- ระบบตรวจสอบโควตารายวัน ---
        function getDailySpins() {
            const today = new Date().toDateString();
            const storedDate = localStorage.getItem('spinDate');
            let count = parseInt(localStorage.getItem('spinCount') || '0');

            if (storedDate !== today) {
                // ขึ้นวันใหม่ รีเซ็ตเป็น 0
                localStorage.setItem('spinDate', today);
                localStorage.setItem('spinCount', '0');
                return 0;
            }
            return count;
        }

        function updateButtonState() {
            const spinsDone = getDailySpins();
            const spinsLeft = MAX_SPINS_PER_DAY - spinsDone;

            if (spinsLeft <= 0) {
                spinBtn.disabled = true;
                spinBtn.innerText = "ครบโควตา 4 ครั้งต่อวันแล้ว";
            } else {
                spinBtn.disabled = false;
                spinBtn.innerText = `หมุนเลย (เหลือ ${spinsLeft} ครั้ง)`;
            }
        }

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < numSegments; i++) {
                const angle = currentAngle + i * arcSize;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius - 5, angle, angle + arcSize);
                ctx.fillStyle = segmentColors[i];
                ctx.fill();
                ctx.strokeStyle = "#bf953f";
                ctx.lineWidth = 3;
                ctx.stroke();
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 28px 'Playfair Display'"; 
                ctx.fillText(prizes[i], radius - 40, 8); 
                ctx.restore();
            }
        }

        function spin() {
            const spinsDone = getDailySpins();
            if (isSpinning || spinsDone >= MAX_SPINS_PER_DAY) return;
            
            isSpinning = true;
            spinBtn.disabled = true;
            spinBtn.innerText = "กำลังหมุน...";
            resultDiv.innerText = "";
            resultDiv.style.opacity = 0;
            mascots.forEach(mascot => mascot.classList.add('mascot-exciting'));

            const winnerIndex = getWinnerIndex();
            const spinTimeTotal = 5000; // หมุน 5 วินาที
            const fullRotations = (Math.floor(Math.random() * 5) + 10) * Math.PI * 2; 
            const offset = (Math.random() * 0.6 + 0.2) * arcSize; 
            const targetAngle = (1.5 * Math.PI) - (winnerIndex * arcSize) - offset;
            const distance = fullRotations + targetAngle - (currentAngle % (Math.PI * 2));
            
            let startTime = null;
            const startAngle = currentAngle;

            function animateSpin(timestamp) {
                if (!startTime) startTime = timestamp;
                const runtime = timestamp - startTime;
                let progress = runtime / spinTimeTotal;
                if (progress >= 1) progress = 1;
                
                const easeOut = 1 - Math.pow(1 - progress, 4); 
                currentAngle = startAngle + distance * easeOut;
                drawWheel();
                
                if (progress < 1) {
                    requestAnimationFrame(animateSpin);
                } else {
                    isSpinning = false;
                    
                    // บันทึกจำนวนครั้งที่หมุน
                    localStorage.setItem('spinCount', (spinsDone + 1).toString());
                    updateButtonState();

                    resultDiv.innerText = `ยินดีด้วย! คุณได้รับ ${prizes[winnerIndex]}`;
                    resultDiv.style.opacity = 1;
                    mascots.forEach(mascot => mascot.classList.remove('mascot-exciting'));
                    winAudio.play().catch(e => {});
                    fireConfetti();
                }
            }
            requestAnimationFrame(animateSpin);
        }

        function getWinnerIndex() {
            let rand = Math.random() * 100;
            let sum = 0;
            for (let i = 0; i < probabilities.length; i++) {
                sum += probabilities[i];
                if (rand <= sum) return i;
            }
            return 0;
        }

        drawWheel();
        updateButtonState();
        spinBtn.addEventListener("click", spin);

        // Confetti Engine
        const confettiCanvas = document.getElementById('confetti-canvas');
        const confettiCtx = confettiCanvas.getContext('2d');
        let confettiParticles = [];

        function fireConfetti() {
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
            for (let i = 0; i < 100; i++) {
                confettiParticles.push({
                    x: window.innerWidth / 2,
                    y: window.innerHeight / 2,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 1) * 15,
                    color: ['#fbf5b7', '#bf953f', '#D90429'][Math.floor(Math.random() * 3)]
                });
            }
            updateConfetti();
        }

        function updateConfetti() {
            confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            confettiParticles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.5;
                confettiCtx.fillStyle = p.color;
                confettiCtx.fillRect(p.x, p.y, 10, 10);
                if (p.y > window.innerHeight) confettiParticles.splice(i, 1);
            });
            if (confettiParticles.length > 0) requestAnimationFrame(updateConfetti);
        }
    </script>
</body>
</html>
